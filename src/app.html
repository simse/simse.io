<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<style>
			@font-face {
				font-family: 'Soehne';
				src: url('/fonts/Soehne-Regular.woff2');
				font-display: swap;
			}
			@font-face {
				font-family: 'Soehne';
				src: url('/fonts/Soehne-Bold.woff2');
				font-weight: 700;
				font-display: swap;
			}
			@font-face {
				font-family: 'SoehneMono';
				src: url('/fonts/Soehne-Mono-Regular.woff2');
				font-display: swap;
			}
			@font-face {
				font-family: 'SoehneMono';
				src: url('/fonts/Soehne-Mono-Bold.woff2');
				font-weight: 700;
				font-display: swap;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="text-zinc-100 bg-zinc-950">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
